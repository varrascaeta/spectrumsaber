[tox]
isolated_build = True
requires = 
    tox>=4.14
    tox-uv>=1.7.0
envlist =
    style,
    docstyle,
    check-manifest,
    check-testdir,
    check-headers,
    check-apidocsdir,
    mkdocs,
    py310,
    py311,
    py312,
    coverage

# =============================================================================
# ENVS
# =============================================================================


[testenv:style]
description = "Runs code style checks with flake8 to ensure consistency and quality"
labels = static
runner = uv-venv-lock-runner
skip_install = True
usedevelop = False
deps =
    tomli
    flake8
    flake8-import-order
    flake8-black
    flake8-builtins
commands =
        flake8 src/ {posargs}


[testenv:docstyle]
description = "Verifies documentation style following NumPy convention"
labels = static
runner = uv-venv-lock-runner
skip_install = True
deps =
    tomli
    pydocstyle
    toml
commands =
    pydocstyle src/spectrumsaber/ --ignore-decorators=doc_inherit --convention=numpy --add-ignore=D401


[testenv:check-testdir]
description = "Checks the structure and organization of the test directory"
labels = static
runner = uv-venv-lock-runner
skip_install = True
deps =
    https://github.com/quatrope/qafan/archive/refs/heads/master.zip
commands =
    check-testdir check src/server/ --reference-dir src/server {posargs}
    check-testdir check src/spectrumsaber/ --reference-dir src/spectrumsaber {posargs}


[testenv:check-apidocsdir]
description = "Verifies that API documentation is complete and correctly structured"
labels = static
runner = uv-venv-lock-runner
skip_install = True
deps =
    https://github.com/quatrope/qafan/archive/refs/heads/master.zip
commands =
    check-apidocsdir check docs/source/api/ --reference-dir src/spectrumsaber {posargs}
    check-apidocsdir check docs/source/api/ --reference-dir src/server {posargs}


[testenv:check-headers]
description = "Ensures all files have the correct headers according to the defined template"
labels = static
runner = uv-venv-lock-runner
skip_install = True
deps =
    https://github.com/quatrope/qafan/archive/refs/heads/master.zip
commands =
    check-headers check src/ --header-template .header-template {posargs}


[testenv:check-manifest]
description = "Verifies that the MANIFEST.in file includes all necessary files for distribution"
labels = static
runner = uv-venv-lock-runner
skip_install = True
usedevelop = False
deps = check-manifest
commands =
    check-manifest


[testenv:mkdocs]
description = "Generates HTML documentation using Sphinx from the source files"
labels = docs
runner = uv-venv-lock-runner
usedevelop = True
skip_install = False
changedir = docs
deps =
    -r {toxinidir}/docs/requirements.txt
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees source {envtmpdir}/html


[testenv]
description = "Runs the test suite with coverage reporting"
labels = dynamic
runner = uv-venv-lock-runner
env_file =
    .env
    environments/testing.env
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    DJANGO_SETTINGS_MODULE = server.settings
    PYTHONPATH = {toxinidir}/src
    AIRFLOW_HOME = {envtmpdir}/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN = sqlite:///{envtmpdir}/airflow/airflow.db
allowlist_externals = bash
commands =
    bash -c " \
        set -a && \
        source .env && \
        source environments/testing.env && \
        mkdir -p {envtmpdir}/airflow && \
        airflow db migrate && \
        pytest \
            src/server/campaigns \
            src/server/places \
            src/etl/tests \
            src/etl/dags/tests \
            src/spectrumsaber/ \
            --cov=src/server \
            --cov=src/etl \
            --cov=src/spectrumsaber \
            --cov-report= \
            --cov-append \
            -vm '' {posargs} \
    "

[testenv:coverage]
description = "Combines coverage data from multiple Python versions and generates the final report"
labels = dynamic
runner = uv-venv-lock-runner
skip_install = False
deps =
    coverage
    pytest
    pytest-cov
    pytest-django
passenv =
    {[testenv]passenv}
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage
    DJANGO_SETTINGS_MODULE = server.settings
    PYTHONPATH = {toxinidir}/src
depends = py310, py311, py312
commands =
    - coverage combine
    coverage report -m --fail-under 80
    coverage html -d {toxworkdir}/htmlcov

# =============================
# Coverage configuration
# =============================

[coverage:run]
source =
    src/server
    src/etl
    src/spectrumsaber

omit =
    */__init__.py
    */migrations/*
    */tests/*
    wsgi.py
    urls.py
    asgi.py
    schema.py

[coverage:report]
show_missing = True
exclude_also =
    def __repr__
    if self\.debug
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    @(abc\.)?abstractmethod